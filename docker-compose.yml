services:
  mysql:
    image: mysql:8
    container_name: mkk_bazis_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: bazis
      MYSQL_USER: bazis
      MYSQL_PASSWORD: bazis123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: mkk_bazis_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mkk_bazis_app
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DB_USER: bazis
      DB_PASSWORD: bazis123
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: bazis
      PORT: 8080
      JWT_SECRET: supersecret
      JWT_EXPIRE: 24
      REDIS_ADDR: redis:6379
    volumes:
      - ./migrations:/app/migrations

volumes:
  mysql_data: